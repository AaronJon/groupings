<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">Student Groups</a>
    <div class="d-flex gap-2">
      <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#joinModal">+ Join Group</button>
      <a href="index.html" class="btn btn-outline-light btn-sm">← Home</a>
    </div>
  </nav>

  <!-- JOIN GROUP MODAL -->
  <div class="modal fade" id="joinModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-4 rounded-4 shadow joinModal">
        <div class="modal-header border-0">
          <h5 class="modal-title">Join a Group</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-0">
          <form id="studentForm" novalidate>

            <div class="mb-3">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control customInput" id="firstName" required>
              <div class="errorText" id="firstNameError"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Middle Name <span class="text-muted">(optional)</span></label>
              <input type="text" class="form-control customInput" id="middleName">
            </div>

            <div class="mb-3">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control customInput" id="lastName" required>
              <div class="errorText" id="lastNameError"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Index Number</label>
              <input type="text" class="form-control customInput" id="indexNumber" required>
              <div class="errorText" id="indexError"></div>
            </div>

            <div class="mb-4">
              <label class="form-label">Region</label>
              <select class="form-select customInput" id="region">
                <option>Ashanti</option>
                <option>Brong Ahafo</option>
                <option>Central</option>
                <option>Eastern</option>
                <option>Greater Accra</option>
                <option>Northern</option>
                <option>Upper East</option>
                <option>Upper West</option>
                <option>Volta</option>
                <option>Western</option>
              </select>
            </div>

            <button type="submit" class="btn joinBtn w-100">Join Group</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- SUCCESS MODAL -->
  <div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4 rounded-4 shadow">
        <!-- <div class="mb-2" style="font-size:48px;">🎉</div> -->
        <h4 class="fw-bold">You're In!</h4>
        <p id="groupMessage" class="text-muted"></p>
        <button class="btn btn-primary px-4" onclick="loadGroups(); bootstrap.Modal.getInstance(document.getElementById('successModal')).hide();">View Groups</button>
      </div>
    </div>
  </div>

  <!-- SEARCH BOX -->
  <div class="container mt-4">
    <div class="row justify-content-center mb-4">
      <div class="col-md-6 d-flex gap-2">
        <input type="text" id="searchIndex" placeholder="Search by name..." class="form-control">
        <button class="btn btn-primary" onclick="searchStudent()">Search</button>
      </div>
      <div class="col-12 text-center mt-2">
        <p id="searchResult" class="fw-bold"></p>
      </div>
    </div>
  </div>

  <!-- GROUP CARDS -->
  <div class="container pb-5">
    <h2 class="text-center mb-4 fw-bold">All Groups</h2>
    <div id="groupsContainer" class="row g-4 justify-content-center">
      <!-- Cards injected by app.js -->
    </div>
  </div>

  <!-- GROUP MEMBERS MODAL (redesigned) -->
  <div class="modal fade" id="groupModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width:480px;">
      <div class="modal-content memberModal">

        <!-- Gradient header -->
        <div class="memberModalHeader">
          <div>
            <h5 class="mb-0 fw-bold" id="modalGroupTitle">Group</h5>
            <small id="modalMemberCount" class="opacity-75"></small>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <!-- Member list -->
        <div class="modal-body p-0">
          <ul id="memberList" class="list-group list-group-flush"></ul>
        </div>

        <div class="modal-footer border-0 justify-content-center">
          <button class="btn btn-outline-secondary btn-sm px-4" data-bs-dismiss="modal">Close</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Firebase SDKs (v8 compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Firebase config -->
  <script src="firebase.js"></script>

  <!-- App logic -->
  <script src="app.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
